  <!-- "RE" text — with dark backing glow for separation, then bright fill -->
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8e8cc"/>
      <stop offset="100%" stop-color="#60c088"/>
    </linearGradient>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.85" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="500" y="900" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="420" fill="url(#textGrad)" letter-spacing="10" filter="url(#textShadow)">RE</text>
